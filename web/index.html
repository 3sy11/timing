<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timing - 回测管理</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
</head>
<body>
  <div id="app">
    <nav class="sidebar">
      <div class="logo">Timing</div>
      <a :class="{active: page==='overview'}" @click="page='overview'">概览</a>
      <a :class="{active: page==='backtest'}" @click="page='backtest'">回测</a>
      <a :class="{active: page==='results'}" @click="page='results'">结果</a>
      <a :class="{active: page==='data'}" @click="page='data'">数据</a>
    </nav>
    <main class="content">
      <overview-page v-if="page==='overview'"></overview-page>
      <backtest-page v-if="page==='backtest'"></backtest-page>
      <results-page v-if="page==='results'"></results-page>
      <data-page v-if="page==='data'"></data-page>
    </main>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
