# 批量回测参数网格配置
#
# 运行：python run_batch.py --config batch_config.toml --output output/
#
# param_grid 中每个 key 对应一个参数，value 为待扫描的值列表。
# 所有参数的笛卡尔积组合会被逐一回测。
# 支持的参数：
#   分析层（RetracementConfig）：touch_tolerance, min_leg_span_pct, touch_cooldown_sec, breakout_tolerance ...
#   策略层（FibStrategy）：position_size, min_strength

symbol = "159363.OF"
interval = "1d"
warmup_bars = 200

[param_grid]
touch_tolerance = [0.3, 0.5, 0.8, 1.0]
min_leg_span_pct = [0.03, 0.05]
min_strength = [0.5, 0.6, 0.7]
