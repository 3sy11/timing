# ══════════════════════════════════════════════════════════════
#  回测配置 — BacktestApp.on_init_dependencies 读取
#
#  每个 [[services]] 动态创建一个带序号 alias 的分析子服务实例
#  例：RetracementService_0, RetracementService_1
# ══════════════════════════════════════════════════════════════

warmup_bars = 200
symbol = "BTCUSDT"
interval = "1h"

[[services]]
module = "timing.analysis.algo.retracement.service.RetracementService"
cache_path = "cache/backtest/retracement_0"
[services.config]
touch_tolerance = 0.3
min_leg_span_pct = 0.05

[[services]]
module = "timing.analysis.algo.retracement.service.RetracementService"
cache_path = "cache/backtest/retracement_1"
[services.config]
touch_tolerance = 0.5
min_leg_span_pct = 0.03
skip_recent = 5
