# ══════════════════════════════════════════════════════════════
#  timing 启动配置  —  bollydog service --config config.toml
#
#  全服务并存，--domains 过滤启动：
#    生产：bollydog service --config config.toml --domains timing,data,analysis
#    回测：TIMING_CLOCK=timing.common.clock.SimulatedClock \
#          bollydog execute RunBacktest --config config.toml
# ══════════════════════════════════════════════════════════════


# ── AnalysisEngine Coordinator（持有唯一 subscriber fan-out）──
["timing.analysis.engine.AnalysisEngine"]
subscriber = {"data.DataEngine.PushBars" = "on_bar"}


# ── 生产入口 ──
["timing.engine.app.TimingApp"]
depends = ["data.DataEngine", "analysis.AnalysisEngine"]


# ── 回测入口 ──
["timing.engine.app.BacktestApp"]
depends = ["data.DataEngine", "analysis.AnalysisEngine"]


# ── 数据层（共享）──
["timing.data.engine.DataEngine"]
db_path = "cache/data.duckdb"

["timing.data.engine.DataEngine".protocol]
module = "bollydog.adapters.composite.TableCacheLayer"
table = "klines"
key_columns = ["symbol", "interval"]
value_columns = ["open", "high", "low", "close", "volume", "ts"]
sort_by = "ts"
flush_threshold = 1
ddl = "CREATE TABLE IF NOT EXISTS klines (\"symbol\" VARCHAR, \"interval\" VARCHAR, \"open\" DOUBLE, \"high\" DOUBLE, \"low\" DOUBLE, \"close\" DOUBLE, \"volume\" DOUBLE, \"ts\" BIGINT)"

["timing.data.engine.DataEngine".protocol.protocol]
module = "bollydog.adapters.sqlalchemy.DuckDBProtocol"
url = "cache/data.duckdb"


# ── 分析服务（生产走 AnalysisEngine fan-out subscriber）──
["timing.analysis.algo.retracement.service.RetracementService"]
cache_path = "cache/analysis"
depends = ["data.DataEngine"]

["timing.analysis.algo.retracement.service.RetracementService".protocol]
module = "bollydog.adapters.composite.CacheLayer"
flush_threshold = 1

["timing.analysis.algo.retracement.service.RetracementService".protocol.protocol]
module = "bollydog.adapters.memory.SQLiteProtocol"
path = "cache/analysis/retracement.sqlite"
