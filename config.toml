# ══════════════════════════════════════════════════════════════
#  timing 启动配置  —  bollydog service --config config.toml
#
#  每个顶层 key 是 AppService 子类的完整导入路径，
#  bollydog CLI 通过 smart_import(key) 加载类并调用 create_from(**conf)。
#
#  create_from 会弹出保留字段 (commands / router_mapping / subscriber / protocol)，
#  其余 kwargs 透传到 cls.__init__。
#  protocol 表声明多层协议链：嵌套 protocol.protocol 递归构建。
# ══════════════════════════════════════════════════════════════


# ── 生产应用 ─────────────────────────────────────────────────
["timing.engine.app.TimingApp"]
data_dir = "cache/"


# ── 回测应用（按需取消注释）─────────────────────────────────
# ["timing.engine.app.BacktestApp"]
# data_dir = "cache/backtest/"


