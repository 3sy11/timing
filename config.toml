# timing 主配置文件
#
# 启动命令：
#   生产模式：python main.py service --config config.toml
#   回测模式：python main.py execute RunBacktest --config config.toml --symbol 159363.OF --interval 1d
#   导入数据：python main.py execute ImportKlines --config config.toml --path warehouse/ods/159363.OF.parquet --symbol 159363.OF --interval 1d
#
# 数据根目录由 TIMING_DATA_ROOT 环境变量控制（默认 warehouse/timing）
# run_id 由 TIMING_RUN_ID 环境变量控制（默认 live_default）

[run]
active_run_id = "live_default"
mode = "live"

# ── HTTP 入口 ──
["bollydog.entrypoint.http.app.HttpService"]

# ── 生产入口 ──
["timing.engine.app.TimingApp"]
depends = ["data.DataEngine", "analysis.RetracementService", "strategy.FibStrategy", "execution.Broker"]

# ── 回测入口 ──
["timing.engine.app.BacktestApp"]
depends = ["data.DataEngine", "strategy.FibStrategy", "execution.Broker"]

# ── 数据层 ──
["timing.data.app.DataEngine"]

# ── 分析层 ──
["timing.analysis.algo.retracement.service.RetracementService"]
depends = ["data.DataEngine"]
subscriber = {"data.DataEngine.PushBars" = "on_bar"}

# ── 策略层 ──
["timing.strategy.app.FibStrategy"]
subscriber = {"analysis.AnalysisEngine.SignalEmitted" = "on_signal"}

# ── 执行层 ──
["timing.execution.broker.Broker"]
initial_balance = 100000
slippage_pct = 0.001
commission_rate = 0.001
