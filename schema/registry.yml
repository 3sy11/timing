# timing/schema/registry.yml
# 采用 Cube 兼容格式: cubes / dimensions / measures
# 扩展字段 x-storage (Cube 会忽略未知前缀) 存放 DDL 相关信息
# 未来可直接迁移为 Cube Server 数据模型

cubes:
  # ═══════════════════════════════════════════
  # 共享原始数据（无 run_id）
  # ═══════════════════════════════════════════

  - name: klines
    description: "K 线原始数据（全局共享，不含 run_id）"
    sql_table: klines
    x-storage:
      primary_key: [symbol, interval, ts]

    dimensions:
      - name: symbol
        sql: symbol
        type: string
      - name: interval
        sql: interval
        type: string
      - name: ts
        sql: ts
        type: number
      - name: open
        sql: open
        type: number
      - name: high
        sql: high
        type: number
      - name: low
        sql: low
        type: number
      - name: close
        sql: close
        type: number
      - name: volume
        sql: volume
        type: number

  - name: indicators
    description: "预计算技术指标（全局共享，不含 run_id）"
    sql_table: indicators
    x-storage:
      primary_key: [symbol, interval, ts]
      compute:
        window:
          sma_5: { fn: ta_sma, args: [close, 5] }
          sma_10: { fn: ta_sma, args: [close, 10] }
          sma_20: { fn: ta_sma, args: [close, 20] }
          sma_60: { fn: ta_sma, args: [close, 60] }
          ema_12: { fn: ta_ema, args: [close, 12] }
          ema_26: { fn: ta_ema, args: [close, 26] }
          rsi_14: { fn: ta_rsi, args: [close, 14] }
          atr_14: { fn: ta_atr, args: [high, low, close, 14] }
        multi_output:
          macd: { fn: t_macd, args: [close, 12, 26, 9], outputs: [macd, macd_signal, macd_hist] }
          bbands: { fn: t_bbands, args: [close, 20, 2.0, 2.0, 0], outputs: [bb_upper, bb_middle, bb_lower] }

    dimensions:
      - name: symbol
        sql: symbol
        type: string
      - name: interval
        sql: interval
        type: string
      - name: ts
        sql: ts
        type: number
      - name: sma_5
        sql: sma_5
        type: number
      - name: sma_10
        sql: sma_10
        type: number
      - name: sma_20
        sql: sma_20
        type: number
      - name: sma_60
        sql: sma_60
        type: number
      - name: ema_12
        sql: ema_12
        type: number
      - name: ema_26
        sql: ema_26
        type: number
      - name: rsi_14
        sql: rsi_14
        type: number
      - name: atr_14
        sql: atr_14
        type: number
      - name: macd
        sql: macd
        type: number
      - name: macd_signal
        sql: macd_signal
        type: number
      - name: macd_hist
        sql: macd_hist
        type: number
      - name: bb_upper
        sql: bb_upper
        type: number
      - name: bb_middle
        sql: bb_middle
        type: number
      - name: bb_lower
        sql: bb_lower
        type: number

  # ═══════════════════════════════════════════
  # 运行相关数据（带 run_id）
  # ═══════════════════════════════════════════

  - name: runs
    description: "运行元数据"
    sql_table: runs
    x-storage:
      primary_key: [run_id]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
        primary_key: true
      - name: created_at
        sql: created_at
        type: number
      - name: status
        sql: status
        type: string
      - name: mode
        sql: mode
        type: string
      - name: description
        sql: description
        type: string
      - name: params
        sql: params
        type: string

  - name: signals
    description: "分析信号（所有算法的最终输出）"
    sql_table: signals
    x-storage:
      primary_key: [run_id, symbol, interval, ts, source]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
      - name: symbol
        sql: symbol
        type: string
      - name: interval
        sql: interval
        type: string
      - name: ts
        sql: ts
        type: number
      - name: direction
        sql: direction
        type: string
      - name: strength
        sql: strength
        type: number
      - name: price
        sql: price
        type: number
      - name: source
        sql: source
        type: string
      - name: level
        sql: level
        type: number
      - name: metadata
        sql: metadata
        type: string

  - name: analysis
    description: "分析状态（通用表：算法中间状态 + 增量游标，name 区分用途）"
    sql_table: analysis
    x-storage:
      primary_key: [run_id, symbol, interval, name]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
      - name: symbol
        sql: symbol
        type: string
      - name: interval
        sql: interval
        type: string
      - name: name
        sql: name
        type: string
      - name: ts
        sql: ts
        type: number
      - name: data
        sql: data
        type: string

  - name: decisions
    description: "策略决策"
    sql_table: decisions
    x-storage:
      primary_key: [run_id, symbol, ts]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
      - name: symbol
        sql: symbol
        type: string
      - name: ts
        sql: ts
        type: number
      - name: direction
        sql: direction
        type: string
      - name: strength
        sql: strength
        type: number
      - name: price
        sql: price
        type: number
      - name: action
        sql: action
        type: string
      - name: reason
        sql: reason
        type: string

  - name: orders
    description: "订单"
    sql_table: orders
    x-storage:
      primary_key: [run_id, order_id]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
      - name: order_id
        sql: order_id
        type: string
        primary_key: true
      - name: symbol
        sql: symbol
        type: string
      - name: side
        sql: side
        type: string
      - name: order_type
        sql: order_type
        type: string
      - name: quantity
        sql: quantity
        type: number
      - name: price
        sql: price
        type: number
      - name: stop_price
        sql: stop_price
        type: number
      - name: status
        sql: status
        type: string
      - name: fill_price
        sql: fill_price
        type: number
      - name: filled_quantity
        sql: filled_quantity
        type: number
      - name: commission
        sql: commission
        type: number
      - name: created_at
        sql: created_at
        type: number
      - name: filled_at
        sql: filled_at
        type: number

  - name: fills
    description: "成交记录"
    sql_table: fills
    x-storage:
      primary_key: [run_id, order_id, ts]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
      - name: order_id
        sql: order_id
        type: string
      - name: symbol
        sql: symbol
        type: string
      - name: side
        sql: side
        type: string
      - name: filled_price
        sql: filled_price
        type: number
      - name: filled_quantity
        sql: filled_quantity
        type: number
      - name: commission
        sql: commission
        type: number
      - name: ts
        sql: ts
        type: number

  - name: positions
    description: "持仓"
    sql_table: positions
    x-storage:
      primary_key: [run_id, symbol]

    dimensions:
      - name: run_id
        sql: run_id
        type: string
      - name: symbol
        sql: symbol
        type: string
      - name: side
        sql: side
        type: string
      - name: quantity
        sql: quantity
        type: number
      - name: avg_entry_price
        sql: avg_entry_price
        type: number
      - name: realized_pnl
        sql: realized_pnl
        type: number

    measures:
      - name: win_rate
        sql: "CASE WHEN {CUBE}.realized_pnl > 0 THEN 1 ELSE 0 END"
        type: avg
      - name: total_pnl
        sql: realized_pnl
        type: sum
